<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <!-- LEFT SECTION -->
        <div class="left-panel">
            <span class="logo-icon">🎓</span> AMS<span>Portal</span>
            <br>
           <h2><p>Academic Management System</p></h2> 
        </div>

        <!-- RIGHT SECTION -->
        <div class="right-panel">

            <h2>Login</h2>
            
           
            
         
           <form th:action="@{/admin/login/process}" method="post">

                <div class="input-group">
                    <label>Email</label>
                    
                    
                    <input type="email" name="email" required placeholder="Enter Email"> 
    
                </div>

              <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" name="password" required placeholder="Enter Password">
</div>

<div class="form-check">
    <input type="checkbox" id="showPass" onclick="togglePassword()">
    <label for="showPass">Show Password</label>
</div>

<script>
function togglePassword() {
    // This now matches the ID added above
    var passField = document.getElementById("password");
    if (passField.type === "password") {
        passField.type = "text";
    } else {
        passField.type = "password";
    }
}
</script></script>

                <!-- <button type="submit" class="login-btn">
                    Login
                </button> -->
                <button type="submit" class="login-btn">Login</button>
            </form>
            <br>
            
           
        </div>

    </div>

</div>

</body>

<script>
    // Wait for the page to load
    window.onload = function() {
        // Check if the URL contains "error=true"
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            showErrorAlert("Invalid Email or Password. Please try again.");
        }
    };

    function showErrorAlert(message) {
        // Create the alert element
        const alertBox = document.createElement("div");
        alertBox.innerText = message;
        
        // Simple CSS styles for a professional look
        Object.assign(alertBox.style, {
            position: "fixed",
            top: "20px",
            left: "50%",
            transform: "translateX(-50%)",
            backgroundColor: "#f44336", // Red
            color: "white",
            padding: "15px 30px",
            borderRadius: "8px",
            boxShadow: "0px 4px 10px rgba(0,0,0,0.3)",
            zIndex: "1000",
            fontSize: "16px",
            fontWeight: "bold",
            transition: "opacity 0.5s ease"
        });

        document.body.appendChild(alertBox);

        // Make it disappear after 3 seconds
        setTimeout(() => {
            alertBox.style.opacity = "0";
            setTimeout(() => alertBox.remove(), 500);
        }, 3000);
    }
</script>

</html>
